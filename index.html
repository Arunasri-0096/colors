<!DOCTYPE html>
<html>
<head>
    <title>Colors & Emotions</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: black;
            color: white;
        }

        .box {
            width: 200px;
            height: 200px;
            margin: 20px;
            display: inline-block;
            line-height: 200px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 20px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .red { background-color: red; }
        .blue { background-color: blue; }
        .yellow { background-color: yellow; color: black; }
        .green { background-color: green; }
        .purple { background-color: purple; }

    </style>
</head>
